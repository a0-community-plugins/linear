<html>
<head>
    <title>Linear</title>
</head>

<body>
    <div x-data="{ _ctx: null, get config() { return this._ctx?.settings; }, get context() { return this._ctx; } }"
         x-create="(() => { const m = $el.closest('.modal'); _ctx = m?.__pluginSettingsContext; })()">
        <template x-if="config">
            <div>
                <div class="section-title">Linear Integration</div>
                <div class="section-description">
                    Connect Agent Zero to your Linear workspace. Create an API key at
                    <a href="https://linear.app/settings/account/security" target="_blank" rel="noopener noreferrer">
                        Linear Settings &gt; Security &amp; Access
                    </a>.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">API Key</div>
                        <div class="field-description">
                            Your personal Linear API key. Used to authenticate all requests.
                        </div>
                    </div>
                    <div class="field-control">
                        <input
                            type="password"
                            x-model="config.api_key"
                            placeholder="lin_api_..."
                        />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Default Team</div>
                        <div class="field-description">
                            Optional team ID or key used when no team is specified in tool calls.
                            Use the linear:list_teams tool to find your team IDs.
                        </div>
                    </div>
                    <div class="field-control">
                        <input
                            type="text"
                            x-model="config.default_team"
                            placeholder="e.g. team UUID or key"
                        />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Show Sidebar Button</div>
                        <div class="field-description">
                            Show a quick-access button for the Linear dashboard in the sidebar.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.show_sidebar_button" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-Refresh on Focus</div>
                        <div class="field-description">
                            Automatically refresh the issue list when the browser tab regains focus.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.auto_refresh_on_focus" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
