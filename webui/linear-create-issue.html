<html>
<head>
    <title>Create Issue</title>
    <script type="module">
        import { store } from "/plugins/linear/webui/linear-dashboard-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.linearDashboardStore">
            <div class="lci-form">
                <label class="lci-field">
                    <span class="lci-label">Title *</span>
                    <input type="text" x-model="$store.linearDashboardStore.createForm.title"
                           placeholder="Issue title" autofocus />
                </label>

                <label class="lci-field">
                    <span class="lci-label">Team *</span>
                    <select x-model="$store.linearDashboardStore.createForm.team_id">
                        <option value="">Select team</option>
                        <template x-for="team in $store.linearDashboardStore.teams" :key="team.id">
                            <option :value="team.id" x-text="team.name"></option>
                        </template>
                    </select>
                </label>

                <div class="lci-row">
                    <label class="lci-field">
                        <span class="lci-label">State</span>
                        <select x-model="$store.linearDashboardStore.createForm.state_id">
                            <option value="">Default</option>
                            <template x-for="state in $store.linearDashboardStore.states" :key="state.id">
                                <option :value="state.id" x-text="state.name"></option>
                            </template>
                        </select>
                    </label>

                    <label class="lci-field">
                        <span class="lci-label">Assignee</span>
                        <select x-model="$store.linearDashboardStore.createForm.assignee_id">
                            <option value="">Unassigned</option>
                            <template x-for="member in $store.linearDashboardStore.members" :key="member.id">
                                <option :value="member.id" x-text="member.displayName || member.name"></option>
                            </template>
                        </select>
                    </label>

                    <label class="lci-field">
                        <span class="lci-label">Priority</span>
                        <select x-model="$store.linearDashboardStore.createForm.priority">
                            <option value="">None</option>
                            <option value="1">Urgent</option>
                            <option value="2">High</option>
                            <option value="3">Medium</option>
                            <option value="4">Low</option>
                        </select>
                    </label>
                </div>

                <label class="lci-field">
                    <span class="lci-label">Description</span>
                    <textarea rows="5"
                              x-model="$store.linearDashboardStore.createForm.description"
                              placeholder="Markdown description (optional)"></textarea>
                </label>
            </div>
        </template>
    </div>

    <div class="modal-footer" data-modal-footer>
        <button class="btn btn-ok"
                @click="$store.linearDashboardStore.submitCreateIssue()">Create</button>
        <button class="btn btn-cancel"
                @click="closeModal('../plugins/linear/webui/linear-create-issue.html')">Cancel</button>
    </div>

    <style>
        .lci-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .lci-field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .lci-label {
            font-size: var(--font-size-small, 0.85rem);
            font-weight: 600;
            color: var(--color-text-secondary, #aaa);
        }
        .lci-row {
            display: flex;
            gap: 0.75rem;
        }
        .lci-row .lci-field {
            flex: 1;
            min-width: 0;
        }
        .lci-form textarea {
            width: 100%;
            resize: vertical;
            font-family: inherit;
        }
        .lci-form select {
            width: 100%;
        }
    </style>
</body>
</html>
