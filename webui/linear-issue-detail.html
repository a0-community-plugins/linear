<html>
<head>
    <title>Issue Detail</title>
    <script type="module">
        import { store } from "/plugins/linear/webui/linear-dashboard-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.linearDashboardStore?.detailIssue">
            <div class="lid-container"
                 x-destroy="$store.linearDashboardStore.detailIssue = null">

                <!-- Header -->
                <div class="lid-header">
                    <span class="lid-identifier" x-text="$store.linearDashboardStore.detailIssue.identifier"></span>
                    <span class="lid-title" x-text="$store.linearDashboardStore.detailIssue.title"></span>
                </div>

                <!-- Content area -->
                <div class="lid-content">
                    <!-- Description -->
                    <div class="lid-description">
                        <div class="lid-section-title">Description</div>
                        <div class="lid-desc-body"
                             x-text="$store.linearDashboardStore.detailIssue.description || '(No description)'"></div>
                    </div>

                    <!-- Metadata sidebar -->
                    <div class="lid-sidebar">
                        <div class="lid-meta-row">
                            <span class="lid-meta-label">State</span>
                            <span>
                                <span class="ld-state-dot"
                                      :style="'background:' + $store.linearDashboardStore.stateColor($store.linearDashboardStore.detailIssue.state?.type)"></span>
                                <span x-text="$store.linearDashboardStore.detailIssue.state?.name || '—'"></span>
                            </span>
                        </div>
                        <div class="lid-meta-row">
                            <span class="lid-meta-label">Assignee</span>
                            <span x-text="$store.linearDashboardStore.detailIssue.assignee?.name || 'Unassigned'"></span>
                        </div>
                        <div class="lid-meta-row">
                            <span class="lid-meta-label">Priority</span>
                            <span x-text="$store.linearDashboardStore.detailIssue.priorityLabel || 'None'"></span>
                        </div>
                        <template x-if="$store.linearDashboardStore.detailIssue.labels?.nodes?.length">
                            <div class="lid-meta-row">
                                <span class="lid-meta-label">Labels</span>
                                <span>
                                    <template x-for="label in $store.linearDashboardStore.detailIssue.labels.nodes" :key="label.id">
                                        <span class="ld-label" :style="label.color ? 'border-color:' + label.color : ''" x-text="label.name"></span>
                                    </template>
                                </span>
                            </div>
                        </template>
                        <template x-if="$store.linearDashboardStore.detailIssue.project">
                            <div class="lid-meta-row">
                                <span class="lid-meta-label">Project</span>
                                <span x-text="$store.linearDashboardStore.detailIssue.project.name"></span>
                            </div>
                        </template>
                        <div class="lid-meta-row">
                            <span class="lid-meta-label">Created</span>
                            <span x-text="$store.linearDashboardStore.timeAgo($store.linearDashboardStore.detailIssue.createdAt)"></span>
                        </div>
                        <div class="lid-meta-row">
                            <span class="lid-meta-label">Updated</span>
                            <span x-text="$store.linearDashboardStore.timeAgo($store.linearDashboardStore.detailIssue.updatedAt)"></span>
                        </div>
                    </div>
                </div>

                <!-- Comments -->
                <template x-if="$store.linearDashboardStore.detailIssue.comments?.nodes?.length">
                    <div class="lid-comments">
                        <div class="lid-section-title"
                             x-text="'Comments (' + $store.linearDashboardStore.detailIssue.comments.nodes.length + ')'"></div>
                        <template x-for="comment in $store.linearDashboardStore.detailIssue.comments.nodes" :key="comment.id">
                            <div class="lid-comment">
                                <div class="lid-comment-header">
                                    <span class="lid-comment-author" x-text="comment.user?.name || '?'"></span>
                                    <span class="lid-comment-time" x-text="$store.linearDashboardStore.timeAgo(comment.createdAt)"></span>
                                </div>
                                <div class="lid-comment-body" x-text="comment.body"></div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Add comment -->
                <div class="lid-add-comment">
                    <input type="text" placeholder="Add a comment..."
                           x-model="$store.linearDashboardStore.commentText"
                           @keydown.enter="$store.linearDashboardStore.addComment($store.linearDashboardStore.detailIssue.id)" />
                    <button class="btn btn-ok btn-sm"
                            @click="$store.linearDashboardStore.addComment($store.linearDashboardStore.detailIssue.id)">
                        <span class="material-symbols-outlined">send</span>
                    </button>
                </div>
            </div>
        </template>
    </div>

    <div class="modal-footer" data-modal-footer>
        <div style="display: flex; gap: 0.5rem; align-items: center; width: 100%;">
            <select style="width: auto;"
                    @change="$store.linearDashboardStore.updateIssueStatus($store.linearDashboardStore.detailIssue?.id, $event.target.value); $event.target.value = ''">
                <option value="">Change Status...</option>
                <template x-for="state in $store.linearDashboardStore.states" :key="state.id">
                    <option :value="state.id" x-text="state.name"></option>
                </template>
            </select>
            <select style="width: auto;"
                    @change="$store.linearDashboardStore.assignIssue($store.linearDashboardStore.detailIssue?.id, $event.target.value); $event.target.value = ''">
                <option value="">Assign...</option>
                <template x-for="member in $store.linearDashboardStore.members" :key="member.id">
                    <option :value="member.id" x-text="member.displayName || member.name"></option>
                </template>
            </select>
            <a class="btn btn-cancel" style="margin-left: auto;"
               :href="$store.linearDashboardStore.detailIssue?.url"
               target="_blank" rel="noopener noreferrer">
                Open in Linear
                <span class="material-symbols-outlined" style="font-size: 1rem; vertical-align: middle;">open_in_new</span>
            </a>
        </div>
    </div>

    <style>
        .lid-container {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-sm, 0.5rem);
        }
        .lid-header {
            display: flex;
            gap: 0.5rem;
            align-items: baseline;
        }
        .lid-identifier {
            font-weight: bold;
            color: var(--color-accent, #3b82f6);
            white-space: nowrap;
        }
        .lid-title {
            font-size: 1.1rem;
        }

        /* Content area */
        .lid-content {
            display: flex;
            gap: var(--spacing-md, 1rem);
            min-height: 200px;
        }
        .lid-description {
            flex: 1;
            min-width: 0;
        }
        .lid-desc-body {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: var(--font-size-normal, 0.95rem);
            line-height: 1.6;
        }
        .lid-sidebar {
            min-width: 200px;
            max-width: 250px;
            border-left: 1px solid var(--color-border);
            padding-left: var(--spacing-md, 1rem);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .lid-meta-row {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .lid-meta-label {
            font-size: 0.75rem;
            color: var(--color-text-secondary, #888);
            text-transform: uppercase;
        }

        .lid-section-title {
            font-weight: bold;
            margin-bottom: 0.5rem;
            font-size: var(--font-size-small, 0.85rem);
            color: var(--color-text-secondary, #888);
            text-transform: uppercase;
        }

        /* Comments */
        .lid-comments {
            border-top: 1px solid var(--color-border);
            padding-top: var(--spacing-sm, 0.5rem);
        }
        .lid-comment {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .lid-comment-header {
            display: flex;
            gap: 0.5rem;
            align-items: baseline;
            margin-bottom: 0.25rem;
        }
        .lid-comment-author {
            font-weight: bold;
            font-size: var(--font-size-small, 0.85rem);
        }
        .lid-comment-time {
            font-size: 0.75rem;
            color: var(--color-text-secondary, #888);
        }
        .lid-comment-body {
            font-size: var(--font-size-small, 0.85rem);
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* Add comment */
        .lid-add-comment {
            display: flex;
            gap: 0.25rem;
            margin-top: var(--spacing-sm, 0.5rem);
        }
        .lid-add-comment input {
            flex: 1;
        }

        /* Shared classes (redefined for modal component scope) */
        .ld-state-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
            vertical-align: middle;
        }
        .ld-label {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.1rem 0.4rem;
            border-radius: 8px;
            font-size: 0.7rem;
            margin-right: 0.25rem;
        }
        .btn-sm {
            padding: 0.2rem 0.4rem;
            font-size: 0.8rem;
        }
        .btn-sm .material-symbols-outlined {
            font-size: 1rem;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .lid-content {
                flex-direction: column;
            }
            .lid-sidebar {
                border-left: none;
                border-top: 1px solid var(--color-border);
                padding-left: 0;
                padding-top: var(--spacing-sm, 0.5rem);
                max-width: none;
            }
        }
    </style>
</body>
</html>
